[graph]
all-features = false

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# Transitive deps from iced that are unmaintained; will resolve with
# iced updates. Not under our control.
ignore = [
    "RUSTSEC-2024-0384", # instant (transitive via iced/wgpu)
    "RUSTSEC-2024-0436", # paste (transitive via iced)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
