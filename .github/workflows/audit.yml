name: Security Audit
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  audit:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
