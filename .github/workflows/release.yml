name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin irc-server --bin irc-bnc --bin irc-cli
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/irc-server
            target/${{ matrix.target }}/release/irc-bnc
            target/${{ matrix.target }}/release/irc-cli

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/docker/irc-server.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/irc-server:${{ github.ref_name }},ghcr.io/${{ github.repository_owner }}/irc-server:latest
          platforms: linux/amd64,linux/arm64
      - name: Build and push bnc
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/docker/irc-bnc.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/irc-bnc:${{ github.ref_name }},ghcr.io/${{ github.repository_owner }}/irc-bnc:latest
          platforms: linux/amd64,linux/arm64

  release:
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            binaries-*/*
