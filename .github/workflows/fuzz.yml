name: Fuzz
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fuzz:
    continue-on-error: true
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [decoder, casemap, codec]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz --locked
      - run: cd crates/irc-proto && cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=300
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: crates/irc-proto/fuzz/artifacts/
